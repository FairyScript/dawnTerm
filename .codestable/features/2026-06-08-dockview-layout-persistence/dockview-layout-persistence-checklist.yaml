feature: 2026-06-08-dockview-layout-persistence
design: dockview-layout-persistence-design.md

steps:
  - id: 1
    title: 创建 LayoutStorage 模块骨架
    description: 新建 src/mainview/utils/LayoutStorage.ts，定义 save/load 方法签名和类型
    paradigm: 编排骨架
    status: done
    exit_signal: 模块文件存在，TypeScript 类型定义完整

  - id: 2
    title: 实现文件路径计算
    description: 实现获取 ~/.config/dawnTerm/layout.json 路径的逻辑，确保目录存在
    paradigm: 计算节点
    status: done
    exit_signal: 路径计算正确，目录不存在时自动创建

  - id: 3
    title: 实现 JSON 序列化/反序列化
    description: 实现 save（写入 JSON）和 load（读取并解析）方法，含错误处理
    paradigm: 计算节点
    status: done
    exit_signal: 正常读写成功，文件不存在返回 null，解析失败返回 null

  - id: 4
    title: 实现 debounce 保存逻辑
    description: 对 save 方法添加 debounce，避免布局拖拽时频繁写入
    paradigm: 计算节点
    status: done
    exit_signal: 连续调用 save 只有最后一次实际写入

  - id: 5
    title: 集成布局恢复到 App.tsx
    description: 在 onReady 事件中调用 LayoutStorage.load()，有数据则 api.fromJSON()
    paradigm: 持久化
    status: done
    exit_signal: 应用启动时自动恢复保存的布局

  - id: 6
    title: 集成布局保存到 App.tsx
    description: 监听 api.onDidLayoutChange 事件，调用 LayoutStorage.save()
    paradigm: 持久化
    status: done
    exit_signal: 布局变化后 layout.json 文件更新

  - id: 7
    title: 更新架构文档
    description: 在 ARCHITECTURE.md 中新增 LayoutStorage 模块说明
    paradigm: 文档
    status: done
    exit_signal: ARCHITECTURE.md 包含 LayoutStorage 模块描述

